<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Cruz Maya | Conoce tu Energía Ancestral</title>
    <meta name="description" content="Calcula tu signo del calendario sagrado Tzolkin y descubre tu energía ancestral según la cultura Maya.">
    <style>
        :root {
            --primary: #D4AF37;
            --secondary: #8B4513;
            --accent: #2E8B57;
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 50px;
        }
        header {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            box-shadow: var(--shadow);
            position: relative;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p.subtitle { font-size: 1.1rem; opacity: 0.9; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
        }
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .form-group { margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-color);
        }
        input:focus { outline: none; border-color: var(--primary); }
        .error-msg { color: #e74c3c; font-size: 0.85rem; margin-top: 5px; display: none; }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-primary:hover { background: #b5952f; }
        .btn-primary:disabled { background: #ccc; cursor: not-allowed; }
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .result-item {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 2px solid var(--primary);
        }
        .result-item:hover { transform: translateY(-5px); box-shadow: 0 8px 15px rgba(0,0,0,0.15); }
        .glyph { font-size: 3rem; margin-bottom: 0.5rem; display: block; }
        .title { font-weight: bold; color: var(--secondary); font-size: 1.1rem; }
        .desc { font-size: 0.9rem; margin-top: 0.5rem; color: #666; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .close-modal {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5rem; cursor: pointer;
        }
        .actions-bar { display: flex; gap: 10px; margin-top: 1rem; justify-content: center; }
        .btn-secondary {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-secondary:hover { background: var(--secondary); color: white; }
        .history-section { margin-top: 2rem; border-top: 1px solid #ddd; padding-top: 1rem; }
        .history-list { list-style: none; }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 600px) { h1 { font-size: 1.8rem; } .results-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<header>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema">🌙</button>
    <h1>Calculadora de Cruz Maya</h1>
    <p class="subtitle">Descubre tu energía ancestral del Tzolkin</p>
</header>
<main id="main-content" class="container">
    <section class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Ingresa tu fecha de nacimiento</h2>
        <form id="mayaForm">
            <div class="form-group">
                <label for="birthdate">Fecha:</label>
                <input type="date" id="birthdate" required>
                <span id="date-error" class="error-msg">Por favor ingresa una fecha válida.</span>
            </div>
            <button type="submit" class="btn-primary" id="calcBtn">Calcular mi Cruz Maya</button>
        </form>
        <div id="results" class="results-grid"></div>
        <div id="actionArea" style="display:none; margin-top: 20px;">
            <div class="actions-bar">
                <button class="btn-secondary" onclick="shareResult()">📤 Compartir</button>
                <button class="btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
    </section>
    <section class="card history-section" id="historySection" style="display:none;">
        <h3>🕒 Historial Reciente</h3>
        <ul class="history-list" id="historyList"></ul>
        <button class="btn-secondary" style="margin-top:10px;" onclick="clearHistory()">Borrar historial</button>
    </section>
</main>
<div id="detailModal" class="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary); margin-bottom: 1rem;"></h2>
        <div id="modalGlyph" style="font-size: 4rem; text-align: center; margin-bottom: 1rem;"></div>
        <p id="modalDesc" style="line-height: 1.8;"></p>
        <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee;">
            <strong>Elemento:</strong> <span id="modalElement"></span><br>
            <strong>Dirección:</strong> <span id="modalDirection"></span>
        </div>
    </div>
</div>
<script>
const NAWALES = [
    { id: 1, name: "Imix", glyph: "🐊", element: "Agua", direction: "Este", desc: "El inicio, la creatividad, el origen de la vida." },
    { id: 2, name: "Ik'", glyph: "💨", element: "Aire", direction: "Norte", desc: "El viento, la comunicación, el espíritu." },
    { id: 3, name: "Ak'b'al", glyph: "🌑", element: "Tierra", direction: "Oeste", desc: "La noche, lo oculto, los sueños." },
    { id: 4, name: "K'an", glyph: "🌽", element: "Fuego", direction: "Sur", desc: "La semilla, la abundancia, el conocimiento." },
    { id: 5, name: "Chikchan", glyph: "🐍", element: "Fuego", direction: "Sur", desc: "La serpiente, la energía vital, la sabiduría." },
    { id: 6, name: "Kimi", glyph: "💀", element: "Tierra", direction: "Oeste", desc: "La muerte, la transformación, el renacer." },
    { id: 7, name: "Manik'", glyph: "🦌", element: "Tierra", direction: "Oeste", desc: "El ciervo, la provisión, la sanación." },
    { id: 8, name: "Lamat", glyph: "⭐", element: "Fuego", direction: "Sur", desc: "La estrella, la belleza, el arte." },
    { id: 9, name: "Muluk", glyph: "💧", element: "Agua", direction: "Este", desc: "El agua, la purificación, las emociones." },
    { id: 10, name: "Ok", glyph: "🐕", element: "Tierra", direction: "Oeste", desc: "El perro, la lealtad, el amor incondicional." },
    { id: 11, name: "Chuwen", glyph: "🧵", element: "Tierra", direction: "Oeste", desc: "El mono, la creación, el tejido del destino." },
    { id: 12, name: "Eb'", glyph: "🦷", element: "Aire", direction: "Norte", desc: "El camino, el diente, la perseverancia." },
    { id: 13, name: "B'en", glyph: "🌽", element: "Fuego", direction: "Sur", desc: "El maíz, la fuerza vital, la comunidad." },
    { id: 14, name: "Ix", glyph: "🐆", element: "Tierra", direction: "Oeste", desc: "El jaguar, la magia, el poder femenino." },
    { id: 15, name: "Men", glyph: "🦅", element: "Aire", direction: "Norte", desc: "El águila, la visión, la libertad." },
    { id: 16, name: "Kib'", glyph: "🕯️", element: "Tierra", direction: "Oeste", desc: "El búho, la intuición, la luz interior." },
    { id: 17, name: "Kab'an", glyph: "🌍", element: "Tierra", direction: "Oeste", desc: "La tierra, el movimiento, la evolución." },
    { id: 18, name: "Etz'nab'", glyph: "🗡️", element: "Aire", direction: "Norte", desc: "El cuchillo, la verdad, la precisión." },
    { id: 19, name: "Kawak", glyph: "⛈️", element: "Agua", direction: "Este", desc: "La tormenta, la renovación, la prueba." },
    { id: 20, name: "Ajaw", glyph: "👑", element: "Fuego", direction: "Sur", desc: "El sol, el liderazgo, la iluminación." }
];
const form = document.getElementById('mayaForm');
const dateInput = document.getElementById('birthdate');
const resultsDiv = document.getElementById('results');
const themeToggle = document.getElementById('themeToggle');
const modal = document.getElementById('detailModal');
const historySection = document.getElementById('historySection');
const historyList = document.getElementById('historyList');
const calcBtn = document.getElementById('calcBtn');

document.addEventListener('DOMContentLoaded', () => {
    loadTheme();
    loadHistory();
});

function loadTheme() {
    const savedTheme = localStorage.getItem('mayaTheme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
    themeToggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
}

themeToggle.addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('mayaTheme', next);
    themeToggle.textContent = next === 'dark' ? '☀️' : '🌙';
});

form.addEventListener('submit', (e) => {
    e.preventDefault();
    if (!dateInput.value) {
        document.getElementById('date-error').style.display = 'block';
        return;
    }
    document.getElementById('date-error').style.display = 'none';
    calcBtn.disabled = true;
    calcBtn.textContent = 'Calculando...';
    setTimeout(() => {
        const date = new Date(dateInput.value + 'T00:00:00');
        const result = calculateTzolkin(date);
        renderResults(result);
        saveToHistory(dateInput.value, result);
        calcBtn.disabled = false;
        calcBtn.textContent = 'Calcular mi Cruz Maya';
        document.getElementById('actionArea').style.display = 'block';
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
    }, 600);
});

function calculateTzolkin(date) {
    const JDN = getJulianDay(date);
    const baseJDN = getJulianDay(new Date('1971-08-11'));
    const offset = JDN - baseJDN;
    let tone = ((4 - 1 + offset) % 13);
    if (tone < 0) tone += 13;
    tone += 1;
    let nawalIndex = ((19 + offset) % 20);
    if (nawalIndex < 0) nawalIndex += 20;
    return { tone: tone, nawal: NAWALES[nawalIndex], fullDate: date.toLocaleDateString() };
}

function getJulianDay(date) {
    let Y = date.getFullYear(), M = date.getMonth() + 1, D = date.getDate();
    if (M <= 2) { Y -= 1; M += 12; }
    const A = Math.floor(Y / 100);
    const B = 2 - A + Math.floor(A / 4);
    return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524.5;
}

function renderResults(data) {
    resultsDiv.innerHTML = '';
    const mainCard = document.createElement('div');
    mainCard.className = 'result-item';
    mainCard.innerHTML = '<span class="glyph">' + data.nawal.glyph + '</span><div class="title">' + data.tone + ' ' + data.nawal.name + '</div><div class="desc">' + data.nawal.element + ' - ' + data.nawal.direction + '</div><div style="font-size:0.8rem; margin-top:5px; color:var(--accent)">Haz clic para más detalles</div>';
    mainCard.onclick = () => openModal(data.nawal, data.tone);
    resultsDiv.appendChild(mainCard);
    const infoCard = document.createElement('div');
    infoCard.className = 'result-item';
    infoCard.style.border = '1px solid #ddd';
    infoCard.innerHTML = '<span class="glyph">📅</span><div class="title">Fecha Gregoriana</div><div class="desc">' + data.fullDate + '</div>';
    resultsDiv.appendChild(infoCard);
}

window.openModal = function(nawal, tone) {
    document.getElementById('modalTitle').textContent = tone + ' ' + nawal.name;
    document.getElementById('modalGlyph').textContent = nawal.glyph;
    document.getElementById('modalDesc').textContent = nawal.desc;
    document.getElementById('modalElement').textContent = nawal.element;
    document.getElementById('modalDirection').textContent = nawal.direction;
    modal.classList.add('show');
};

window.closeModal = function() { modal.classList.remove('show'); };
window.onclick = function(event) { if (event.target == modal) closeModal(); };

function saveToHistory(dateStr, result) {
    let history = JSON.parse(localStorage.getItem('mayaHistory') || '[]');
    const entry = { date: dateStr, tone: result.tone, nawalName: result.nawal.name };
    if (history.length > 0 && JSON.stringify(history[0]) === JSON.stringify(entry)) return;
    history.unshift(entry);
    if (history.length > 10) history.pop();
    localStorage.setItem('mayaHistory', JSON.stringify(history));
    loadHistory();
}

function loadHistory() {
    const history = JSON.parse(localStorage.getItem('mayaHistory') || '[]');
    historyList.innerHTML = '';
    if (history.length === 0) { historySection.style.display = 'none'; return; }
    historySection.style.display = 'block';
    history.forEach(item => {
        const li = document.createElement('li');
        li.className = 'history-item';
        li.innerHTML = '<span>' + item.date + '</span> <strong>' + item.tone + ' ' + item.nawalName + '</strong>';
        li.onclick = () => { dateInput.value = item.date; form.dispatchEvent(new Event('submit')); };
        historyList.appendChild(li);
    });
}

window.clearHistory = function() { localStorage.removeItem('mayaHistory'); loadHistory(); };

window.shareResult = async function() {
    const lastItem = JSON.parse(localStorage.getItem('mayaHistory') || '[]')[0];
    if (!lastItem) return alert("No hay resultados recientes");
    const text = 'Mi energía Maya es ' + lastItem.tone + ' ' + lastItem.nawalName + '. ¡Descubre la tuya!';
    if (navigator.share) { try { await navigator.share({ title: 'Mi Cruz Maya', text: text }); } catch (err) {} }
    else { navigator.clipboard.writeText(text); alert("Texto copiado: " + text); }
};
</script>
</body>
</html>
