<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- SEO Mejorado -->

    <meta name="keywords" content="Cruz Maya, Tzolkin, Calendario Maya, Nawal, Astrología Maya, Horóscopo Maya">

    <!-- Open Graph / Facebook -->

    <meta property="og:description" content="Descubre tu energía ancestral con el calendario Tzolkin.">
    <meta property="og:image" content="https://tudominio.com/og-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Calculadora de Cruz Maya">
    <meta property="twitter:description" content="Descubre tu energía ancestral con el calendario Tzolkin.">

    <!-- Favicon SVG -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌞</text></svg>">

    <style>
        :root {
            --primary: #D4AF37; /* Dorado Maya */
            --secondary: #8B4513; /* Marrón Tierra */
            --accent: #2E8B57; /* Verde Jade */
            --bg-color: #fdf6e3;
            --text-color: #2c3e50;
            --card-bg: #ffffff;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1a;
            --text-color: #e0e0e0;
            --card-bg: #2d2d2d;
            --shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            transition: var(--transition);
            padding-bottom: 50px;
        }

        /* Skip Link for Accessibility */
        .skip-link {
            position: absolute; top: -40px; left: 0; background: var(--primary); color: white; padding: 8px; z-index: 100;
        }
        .skip-link:focus { top: 0; }

        header {
            text-align: center;
            padding: 2rem 1rem;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            color: white;
            box-shadow: var(--shadow);
            position: relative;
        }

        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        p.subtitle { font-size: 1.1rem; opacity: 0.9; }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            transition: var(--transition);
        }

        /* Theme Toggle */
        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: transform 0.3s;
        }
        .theme-toggle:hover { transform: scale(1.1); background: rgba(255,255,255,0.4); }

        /* Form Styles */
        .form-group { margin-bottom: 1.5rem; position: relative; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            background: var(--card-bg);
            color: var(--text-color);
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        button.btn-primary {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button.btn-primary:hover:not(:disabled) { background: #b5952f; }
        button.btn-primary:active:not(:disabled) { transform: scale(0.98); }
        button.btn-primary:disabled { background: #ccc; cursor: not-allowed; }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Results Grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s, transform 0.5s;
        }
        
        .results-grid.visible { opacity: 1; transform: translateY(0); }

        .result-item {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 10px;
            text-align: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .result-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            border-color: var(--primary);
        }

        .glyph { font-size: 3rem; margin-bottom: 0.5rem; display: block; }
        .title { font-weight: bold; color: var(--secondary); font-size: 1.1rem; }
        [data-theme="dark"] .title { color: var(--primary); }
        .desc { font-size: 0.9rem; margin-top: 0.5rem; color: #666; }
        [data-theme="dark"] .desc { color: #aaa; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .modal.show { display: flex; opacity: 1; }
        
        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            position: relative;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        .modal.show .modal-content { transform: scale(1); }
        
        .close-modal {
            position: absolute; top: 10px; right: 15px;
            font-size: 1.5rem; cursor: pointer; color: var(--text-color);
        }

        /* History & Share */
        .actions-bar {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
            justify-content: center;
        }
        
        .btn-secondary {
            padding: 8px 16px;
            background: transparent;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        [data-theme="dark"] .btn-secondary { border-color: var(--primary); color: var(--primary); }
        .btn-secondary:hover { background: var(--secondary); color: white; }
        [data-theme="dark"] .btn-secondary:hover { background: var(--primary); color: black; }

        .history-section { margin-top: 2rem; border-top: 1px solid #ddd; padding-top: 1rem; }
        .history-list { list-style: none; }
        .history-item {
            padding: 10px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }
        .history-item:hover { background: rgba(0,0,0,0.05); }
        
        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .results-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<a href="#main-content" class="skip-link">Saltar al contenido principal</a>

<header>
    <button class="theme-toggle" id="themeToggle" aria-label="Cambiar tema claro/oscuro">
        🌙
    </button>
    <h1>Calculadora de Cruz Maya</h1>
    <p class="subtitle">Descubre tu energía ancestral del Tzolkin</p>
</header>

<main id="main-content" class="container">
    <section class="card" aria-labelledby="form-title">
        <h2 id="form-title" style="margin-bottom: 1.5rem; text-align: center;">Ingresa tu fecha de nacimiento</h2>
        
        <form id="mayaForm" novalidate>
            <div class="form-group">
                <label for="birthdate">Fecha:</label>
                <input type="date" id="birthdate" required aria-describedby="date-error">
                <span id="date-error" class="error-msg" role="alert">Por favor ingresa una fecha válida.</span>
            </div>

            <button type="submit" class="btn-primary" id="calcBtn">
                <span class="spinner" id="loadingSpinner"></span>
                <span id="btnText">Calcular mi Cruz Maya</span>
            </button>
        </form>

        <div id="results" class="results-grid" aria-live="polite">
            <!-- Resultados inyectados por JS -->
        </div>

        <div id="actionArea" style="display:none; margin-top: 20px;">
            <div class="actions-bar">
                <button class="btn-secondary" onclick="shareResult()">📤 Compartir</button>
                <button class="btn-secondary" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
    </section>

    <section class="card history-section" id="historySection" style="display:none;">
        <h3>🕒 Historial Reciente</h3>
        <ul class="history-list" id="historyList"></ul>
        <button class="btn-secondary" style="margin-top:10px; font-size: 0.8rem;" onclick="clearHistory()">Borrar historial</button>
    </section>
</main>

<!-- Modal Detalle -->
<div id="detailModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary); margin-bottom: 1rem;"></h2>
        <div id="modalGlyph" style="font-size: 4rem; text-align: center; margin-bottom: 1rem;"></div>
        <p id="modalDesc" style="line-height: 1.8;"></p>
        <div style="margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee;">
            <strong>Elemento:</strong> <span id="modalElement"></span><br>
            <strong>Dirección:</strong> <span id="modalDirection"></span>
        </div>
    </div>
</div>

<script>
    // --- DATA CONSTANTS (Optimized Lookup) ---
    const NAWALES = [
        { id: 1, name: "Imix", glyph: "🐊", element: "Agua", direction: "Este", desc: "El inicio, la creatividad, el origen de la vida." },
        { id: 2, name: "Ik'", glyph: "💨", element: "Aire", direction: "Norte", desc: "El viento, la comunicación, el espíritu." },
        { id: 3, name: "Ak'b'al", glyph: "🌑", element: "Tierra", direction: "Oeste", desc: "La noche, lo oculto, los sueños." },
        { id: 4, name: "K'an", glyph: "🌽", element: "Fuego", direction: "Sur", desc: "La semilla, la abundancia, el conocimiento." },
        { id: 5, name: "Chikchan", glyph: "🐍", element: "Fuego", direction: "Sur", desc: "La serpiente, la energía vital, la sabiduría." },
        { id: 6, name: "Kimi", glyph: "💀", element: "Tierra", direction: "Oeste", desc: "La muerte, la transformación, el renacer." },
        { id: 7, name: "Manik'", glyph: "🦌", element: "Tierra", direction: "Oeste", desc: "El ciervo, la provisión, la sanación." },
        { id: 8, name: "Lamat", glyph: "⭐", element: "Fuego", direction: "Sur", desc: "La estrella, la belleza, el arte." },
        { id: 9, name: "Muluk", glyph: "💧", element: "Agua", direction: "Este", desc: "El agua, la purificación, las emociones." },
        { id: 10, name: "Ok", glyph: "🐕", element: "Tierra", direction: "Oeste", desc: "El perro, la lealtad, el amor incondicional." },
        { id: 11, name: "Chuwen", glyph: "🧵", element: "Tierra", direction: "Oeste", desc: "El mono, la creación, el tejido del destino." },
        { id: 12, name: "Eb'", glyph: "🦷", element: "Aire", direction: "Norte", desc: "El camino, el diente, la perseverancia." },
        { id: 13, name: "B'en", glyph: "🌽", element: "Fuego", direction: "Sur", desc: "El maíz, la fuerza vital, la comunidad." },
        { id: 14, name: "Ix", glyph: "🐆", element: "Tierra", direction: "Oeste", desc: "El jaguar, la magia, el poder femenino." },
        { id: 15, name: "Men", glyph: "🦅", element: "Aire", direction: "Norte", desc: "El águila, la visión, la libertad." },
        { id: 16, name: "Kib'", glyph: "🕯️", element: "Tierra", direction: "Oeste", desc: "El buho, la intuición, la luz interior." },
        { id: 17, name: "Kab'an", glyph: "🌍", element: "Tierra", direction: "Oeste", desc: "La tierra, el movimiento, la evolución." },
        { id: 18, name: "Etz'nab'", glyph: "🗡️", element: "Aire", direction: "Norte", desc: "El cuchillo, la verdad, la precisión." },
        { id: 19, name: "Kawak", glyph: "⛈️", element: "Agua", direction: "Este", desc: "La tormenta, la renovación, la prueba." },
        { id: 20, name: "Ajaw", glyph: "👑", element: "Fuego", direction: "Sur", desc: "El sol, el liderazgo, la iluminación." }
    ];

    // --- STATE & DOM ELEMENTS ---
    const form = document.getElementById('mayaForm');
    const dateInput = document.getElementById('birthdate');
    const resultsDiv = document.getElementById('results');
    const themeToggle = document.getElementById('themeToggle');
    const modal = document.getElementById('detailModal');
    const historySection = document.getElementById('historySection');
    const historyList = document.getElementById('historyList');
    const calcBtn = document.getElementById('calcBtn');
    const spinner = document.getElementById('loadingSpinner');
    const btnText = document.getElementById('btnText');

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
        loadTheme();
        loadHistory();
        
        // Validación en tiempo real
        dateInput.addEventListener('input', () => {
            if(dateInput.validity.valid) {
                document.getElementById('date-error').style.display = 'none';
                dateInput.style.borderColor = 'var(--accent)';
            }
        });
    });

    // --- THEME LOGIC ---
    function loadTheme() {
        const savedTheme = localStorage.getItem('mayaTheme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('mayaTheme', next);
        updateThemeIcon(next);
    });

    function updateThemeIcon(theme) {
        themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    // --- CALCULATION LOGIC ---
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        // Validación explícita
        if (!dateInput.value) {
            showError("Por favor selecciona una fecha.");
            return;
        }

        setLoading(true);
        
        // Simular proceso para UX (y permitir ver el spinner)
        setTimeout(() => {
            const date = new Date(dateInput.value + 'T00:00:00'); // Fix timezone issue
            const result = calculateTzolkin(date);
            renderResults(result);
            saveToHistory(dateInput.value, result);
            setLoading(false);
            
            // Scroll suave a resultados
            resultsDiv.scrollIntoView({ behavior: 'smooth' });
        }, 600);
    });

    function showError(msg) {
        const errEl = document.getElementById('date-error');
        errEl.textContent = msg;
        errEl.style.display = 'block';
        dateInput.style.borderColor = '#e74c3c';
        dateInput.focus();
    }

    function setLoading(isLoading) {
        if (isLoading) {
            calcBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Calculando...';
        } else {
            calcBtn.disabled = false;
            spinner.style.display = 'none';
            btnText.textContent = 'Calcular mi Cruz Maya';
        }
    }

    function calculateTzolkin(date) {
        // Algoritmo base: Cuenta larga simplificada desde un punto de referencia
        // Referencia: 11 de agosto de 1971 fue 4 Ahau (ejemplo estándar)
        // Usaremos una fórmula matemática directa basada en el conteo de días
        
        const baseDate = new Date('1971-08-11T00:00:00');
        const diffTime = date - baseDate;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
        
        // Ajuste para números negativos (fechas anteriores a 1971)
        let totalDays = diffDays;
        if (totalDays < 0) {
            // Ajuste modular para negativos
            totalDays = (totalDays % 260 + 260) % 260; 
        }

        // Número del Nawal (1-20)
        // 4 Ahau es el día 0 en nuestra lógica relativa si ajustamos bien, 
        // pero hagámoslo simple: (DiaBase + Offset) % 20
        // Ahau es el index 19 (0-based) o 20 (1-based).
        // El 11 Ago 1971 fue 4 Ahau.
        
        // Fórmula robusta:
        // Numero Tono (1-13): ((4 - 1 + offset) % 13) + 1
        // Index Nawal (0-19): ((19 + offset) % 20)  <-- Ahau es index 19 en array 0-based? No, Ajaw es id 20.
        
        // Simplificación: Contar días totales desde un origen mítico o usar librería.
        // Aquí usaremos un cálculo directo de días julianos modificado.
        
        const JDN = getJulianDay(date);
        const baseJDN = getJulianDay(new Date('1971-08-11'));
        const offset = JDN - baseJDN;
        
        // 4 Ahau -> Tono 4, Nawal Ajaw (Index 19 en 0-19)
        let tone = ((4 - 1 + offset) % 13);
        if (tone < 0) tone += 13;
        tone += 1;
        
        let nawalIndex = ((19 + offset) % 20);
        if (nawalIndex < 0) nawalIndex += 20;
        
        return {
            tone: tone,
            nawal: NAWALES[nawalIndex],
            fullDate: date.toLocaleDateString()
        };
    }

    function getJulianDay(date) {
        // Algoritmo simplificado para JD
        let Y = date.getFullYear();
        let M = date.getMonth() + 1;
        let D = date.getDate();
        
        if (M <= 2) { Y -= 1; M += 12; }
        const A = Math.floor(Y / 100);
        const B = 2 - A + Math.floor(A / 4);
        return Math.floor(365.25 * (Y + 4716)) + Math.floor(30.6001 * (M + 1)) + D + B - 1524.5;
    }

    // --- RENDERING ---
    function renderResults(data) {
        resultsDiv.innerHTML = '';
        resultsDiv.classList.remove('visible');
        
        // Crear tarjeta principal (Signo Solar)
        const mainCard = createResultCard(data.nawal, data.tone, true);
        resultsDiv.appendChild(mainCard);
        
        // Aquí podrías agregar lógica para calcular los otros 3 puntos de la cruz
        // Por ahora mostramos el signo principal destacado
        // Para demo, repetimos con variaciones o mostramos info extra
        
        const infoCard = document.createElement('div');
        infoCard.className = 'result-item';
        infoCard.innerHTML = `
            <span class="glyph">📅</span>
            <div class="title">Fecha Gregoriana</div>
            <div class="desc">${data.fullDate}</div>
        `;
        resultsDiv.appendChild(infoCard);

        setTimeout(() => {
            resultsDiv.classList.add('visible');
            document.getElementById('actionArea').style.display = 'block';
        }, 100);
    }

    function createResultCard(nawal, tone, isMain = false) {
        const div = document.createElement('div');
        div.className = 'result-item';
        if(isMain) div.style.border = `2px solid var(--primary)`;
        
        div.innerHTML = `
            <span class="glyph" aria-hidden="true">${nawal.glyph}</span>
            <div class="title">${tone} ${nawal.name}</div>
            <div class="desc">${nawal.element} - ${nawal.direction}</div>
            ${isMain ? '<div style="font-size:0.8rem; margin-top:5px; color:var(--accent)">Haz clic para más detalles</div>' : ''}
        `;
        
        div.onclick = () => openModal(nawal, tone);
        div.setAttribute('role', 'button');
        div.setAttribute('tabindex', '0');
        div.onkeydown = (e) => { if(e.key === 'Enter') openModal(nawal, tone); };
        
        return div;
    }

    // --- MODAL LOGIC ---
    window.openModal = function(nawal, tone) {
        document.getElementById('modalTitle').textContent = `${tone} ${nawal.name}`;
        document.getElementById('modalGlyph').textContent = nawal.glyph;
        document.getElementById('modalDesc').textContent = nawal.desc;
        document.getElementById('modalElement').textContent = nawal.element;
        document.getElementById('modalDirection').textContent = nawal.direction;
        
        modal.classList.add('show');
        document.body.style.overflow = 'hidden'; // Prevenir scroll
    };

    window.closeModal = function() {
        modal.classList.remove('show');
        document.body.style.overflow = 'auto';
    };

    // Cerrar al hacer click fuera
    window.onclick = function(event) {
        if (event.target == modal) closeModal();
    };

    // --- HISTORY & SHARE ---
    function saveToHistory(dateStr, result) {
        let history = JSON.parse(localStorage.getItem('mayaHistory') || '[]');
        const entry = { date: dateStr, tone: result.tone, nawalName: result.nawal.name };
        
        // Evitar duplicados consecutivos
        if (history.length > 0 && JSON.stringify(history[0]) === JSON.stringify(entry)) return;
        
        history.unshift(entry);
        if (history.length > 10) history.pop();
        
        localStorage.setItem('mayaHistory', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const history = JSON.parse(localStorage.getItem('mayaHistory') || '[]');
        historyList.innerHTML = '';
        
        if (history.length === 0) {
            historySection.style.display = 'none';
            return;
        }
        
        historySection.style.display = 'block';
        history.forEach(item => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `<span>${item.date}</span> <strong>${item.tone} ${item.nawalName}</strong>`;
            li.onclick = () => {
                dateInput.value = item.date;
                form.dispatchEvent(new Event('submit'));
            };
            historyList.appendChild(li);
        });
    }

    window.clearHistory = function() {
        localStorage.removeItem('mayaHistory');
        loadHistory();
    };

    window.shareResult = async function() {
        const lastItem = JSON.parse(localStorage.getItem('mayaHistory') || '[]')[0];
        if (!lastItem) return alert("No hay resultados recientes para compartir");
        
        const text = `Mi energía Maya es ${lastItem.tone} ${lastItem.nawalName}. ¡Descubre la tuya!`;
        
        if (navigator.share) {
            try {
                await navigator.share({ title: 'Mi Cruz Maya', text: text });
            } catch (err) { console.log('Share canceled'); }
        } else {
            navigator.clipboard.writeText(text);
            alert("Texto copiado al portapapeles: " + text);
        }
    };
</script>

</body>
</html>
